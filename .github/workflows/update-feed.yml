name: Update Podcast Feed

# Permissions model: This workflow operates on the least-privilege principle.
# The top-level `permissions` default is set to `contents: read` (no write access).
# Each job explicitly declares only the permissions it requires to function.
#
# Permission rationale:
#   - update-feed job:
#     * contents:write  — write scraped conference data and feed XMLs to output/ and docs/
#     * pages:write     — enable GitHub Pages deployment via Pages API in deploy job
#     * id-token:write  — OpenID Connect token for GitHub Pages environment
#     * issues:write    — file alerts on scrape failures for operator review
#   - deploy job:
#     * pages:write     — deploy built artifacts to GitHub Pages
#     * id-token:write  — OpenID Connect token for secure GitHub Pages deployment

on:
  schedule:
    # General Conference is the first full weekend of April and October
    # Audio release pattern: full sessions same day, individual talks within ~7 days
    #
    # Schedule tiers:
    # 1. Conference window (1st-13th): Check 3x daily to catch drops quickly
    # 2. Rest of year: Monthly maintenance check

    # Conference window - 3x daily (morning, afternoon, evening MDT)
    - cron: '0 14 1-13 4,10 *'   # 8 AM MDT
    - cron: '0 18 1-13 4,10 *'   # 12 PM MDT
    - cron: '0 2 2-14 4,10 *'    # 8 PM MDT (next UTC day for 2nd-14th)

    # Monthly maintenance (rest of year)
    - cron: '0 12 15 1-3,5-9,11-12 *'  # 15th of non-conference months

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      force_scrape:
        description: 'Force re-scrape all conferences'
        required: false
        default: 'false'
        type: boolean
      start_year:
        description: 'Start year for scraping'
        required: false
        default: ''
        type: string
      languages:
        description: 'Languages to scrape (eng, spa, por, or all)'
        required: false
        default: 'all'
        type: string

# Default to minimal permissions (read-only). Jobs override with their specific needs.
permissions:
  contents: read

concurrency:
  # Scheduled runs (3x daily during conference windows) can overlap with
  # manual workflow_dispatch triggers. Serialize all runs on the same branch
  # so they do not race on output/ JSON files or docs/*.xml.
  group: update-feed-${{ github.ref }}
  cancel-in-progress: false

jobs:
  update-feed:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: write
      pages: write
      id-token: write
      issues: write

    steps:
      - name: Validate inputs
        if: github.event_name == 'workflow_dispatch'
        run: |
          # languages must be one of: all, eng, spa, por, or empty
          case "${{ inputs.languages }}" in
            all|eng|spa|por|'') : ;;
            *) echo "::error::Invalid languages input '${{ inputs.languages }}'. Must be one of: all, eng, spa, por, or empty."; exit 1 ;;
          esac
          # start_year must be empty or a 4-digit year between 1971 and current year+1
          if [ -n "${{ inputs.start_year }}" ]; then
            if ! echo "${{ inputs.start_year }}" | grep -Eq '^[0-9]{4}$'; then
              echo "::error::start_year must be a 4-digit year or empty (got '${{ inputs.start_year }}')."
              exit 1
            fi
            YEAR="${{ inputs.start_year }}"
            MIN_OK=1971
            MAX_OK=$(( $(date -u +%Y) + 1 ))
            if [ "$YEAR" -lt "$MIN_OK" ] || [ "$YEAR" -gt "$MAX_OK" ]; then
              echo "::error::start_year $YEAR out of range [${MIN_OK}, ${MAX_OK}]."
              exit 1
            fi
          fi
          # force_scrape + start_year combo: the existing scrape logic lets start_year
          # silently override force_scrape. Warn (not fail) so users know.
          if [ "${{ inputs.force_scrape }}" = "true" ] && [ -n "${{ inputs.start_year }}" ]; then
            echo "::warning::start_year is set; force_scrape=true flag will be ignored by the scrape step chain."
          fi

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Compute min year
        id: minyear
        # Latest two full years of conferences (current year and prior)
        # keeps feed rolling without manual edits.
        run: |
          CURRENT_YEAR=$(date -u +%Y)
          MIN_YEAR=$((CURRENT_YEAR - 1))
          echo "min_year=${MIN_YEAR}" >> $GITHUB_OUTPUT
          echo "Computed min_year=${MIN_YEAR}"

      - name: Type-check
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Run tests
        run: npm test

      - name: Restore cache
        # Key is per-commit so each run has its own save slot, but restore-keys
        # allow falling back to any prior cache with the same package-lock.json.
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .cache
          key: gc-cache-${{ hashFiles('package-lock.json') }}-${{ github.sha }}
          restore-keys: |
            gc-cache-${{ hashFiles('package-lock.json') }}-
            gc-cache-

      - name: Scrape conferences (English)
        id: scrape_eng
        run: |
          # Retry with exponential backoff: 3 attempts with 30s, 60s, 120s delays
          ATTEMPT=1
          while [ $ATTEMPT -le 3 ]; do
            echo "Scrape attempt $ATTEMPT/3..."

            if [ "${{ inputs.force_scrape }}" = "true" ]; then
              npx tsx src/scrape-all.ts --recent --force -l eng && exit 0
            elif [ -n "${{ inputs.start_year }}" ]; then
              npx tsx src/scrape-all.ts --start ${{ inputs.start_year }} --force -l eng && exit 0
            else
              npx tsx src/scrape-all.ts --recent -l eng && exit 0
            fi

            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -le 3 ]; then
              DELAY=$((30 * ATTEMPT))
              echo "Attempt failed. Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done

          # All retries exhausted
          exit 1

      # NOTE: Per-language scrape steps are currently hardcoded. The canonical
      # list of supported language codes lives in `src/languages.ts`
      # (LANGUAGES / LANGUAGE_CODES). Adding a new language here is a separate
      # follow-up — ideally a matrix refactor that reads from that config.
      - name: Scrape conferences (Spanish)
        id: scrape_spa
        if: ${{ inputs.languages == 'all' || inputs.languages == 'spa' || inputs.languages == '' }}
        run: |
          # Retry with exponential backoff: 3 attempts with 30s, 60s, 120s delays
          ATTEMPT=1
          while [ $ATTEMPT -le 3 ]; do
            echo "Scrape attempt $ATTEMPT/3..."
            npx tsx src/scrape-all.ts --recent -l spa && exit 0

            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -le 3 ]; then
              DELAY=$((30 * ATTEMPT))
              echo "Attempt failed. Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done

          # All retries exhausted; allow workflow to continue
          exit 1
        continue-on-error: true

      - name: Scrape conferences (Portuguese)
        id: scrape_por
        if: ${{ inputs.languages == 'all' || inputs.languages == 'por' || inputs.languages == '' }}
        run: |
          # Retry with exponential backoff: 3 attempts with 30s, 60s, 120s delays
          ATTEMPT=1
          while [ $ATTEMPT -le 3 ]; do
            echo "Scrape attempt $ATTEMPT/3..."
            npx tsx src/scrape-all.ts --recent -l por && exit 0

            ATTEMPT=$((ATTEMPT + 1))
            if [ $ATTEMPT -le 3 ]; then
              DELAY=$((30 * ATTEMPT))
              echo "Attempt failed. Retrying in ${DELAY}s..."
              sleep $DELAY
            fi
          done

          # All retries exhausted; allow workflow to continue
          exit 1
        continue-on-error: true

      - name: Generate RSS feeds (all languages)
        run: |
          mkdir -p docs
          BASE_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
          MIN_YEAR=${{ steps.minyear.outputs.min_year }}

          # Generate English feed (always, since English scrape is required)
          echo "Generating English feed..."
          npx tsx src/generate-feed.ts \
            --output ./output \
            --feed ./docs/audio.xml \
            --language eng \
            --min-year "$MIN_YEAR" \
            --base-url "$BASE_URL"

          # Generate Spanish feed only if scrape succeeded
          if [ "${{ steps.scrape_spa.outcome }}" = "success" ]; then
            echo "Generating Spanish feed..."
            npx tsx src/generate-feed.ts \
              --output ./output \
              --feed ./docs/audio-es.xml \
              --language spa \
              --min-year "$MIN_YEAR" \
              --base-url "$BASE_URL"
          else
            echo "Spanish scrape failed; skipping Spanish feed generation"
          fi

          # Generate Portuguese feed only if scrape succeeded
          if [ "${{ steps.scrape_por.outcome }}" = "success" ]; then
            echo "Generating Portuguese feed..."
            npx tsx src/generate-feed.ts \
              --output ./output \
              --feed ./docs/audio-pt.xml \
              --language por \
              --min-year "$MIN_YEAR" \
              --base-url "$BASE_URL"
          else
            echo "Portuguese scrape failed; skipping Portuguese feed generation"
          fi

      - name: Generate landing page (docs/index.html)
        # Landing page derives the GitHub Pages base URL client-side from
        # window.location, so no base-url arg is needed here.
        run: |
          npx tsx src/generate-index.ts \
            --output ./output \
            --index ./docs/index.html

      - name: Emit scrape metrics to step summary
        if: always()
        run: |
          {
            echo "# Scrape Metrics"
            echo ""
            echo "| Language | Attempted | Scraped | Skipped | Failed | Duration |"
            echo "|----------|-----------|---------|---------|--------|----------|"

            for lang in eng spa por; do
              metrics_file="./output/.metrics-${lang}.json"
              if [ -f "$metrics_file" ]; then
                attempted=$(jq '.conferences_attempted' "$metrics_file")
                scraped=$(jq '.conferences_scraped' "$metrics_file")
                skipped=$(jq '.conferences_skipped' "$metrics_file")
                failed=$(jq '.conferences_failed' "$metrics_file")
                duration_s=$(jq 'if .duration_ms then (.duration_ms / 1000 | floor) else 0 end' "$metrics_file")

                # Language display name
                case "$lang" in
                  eng) lang_name="English" ;;
                  spa) lang_name="Spanish" ;;
                  por) lang_name="Portuguese" ;;
                esac

                echo "| $lang_name | $attempted | $scraped | $skipped | $failed | ${duration_s}s |"
              fi
            done

            echo ""
            echo "Feed URLs:"
            echo "- English: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/audio.xml"
            if [ "${{ steps.scrape_spa.outcome }}" = "success" ]; then
              echo "- Spanish: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/audio-es.xml"
            fi
            if [ "${{ steps.scrape_por.outcome }}" = "success" ]; then
              echo "- Portuguese: https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/audio-pt.xml"
            fi
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Check for changes
        id: changes
        run: |
          git add output/ docs/
          if git diff --staged --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Commit changes
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git commit -m "Update podcast feed [automated]

          $(date -u '+%Y-%m-%d %H:%M UTC')"
          git push

      - name: Alert on workflow failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const title = `Workflow failure: ${context.workflow} run ${context.runNumber}`;
            const body = `The [${context.workflow}](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}) workflow failed at ${new Date().toISOString()}.\n\nTriggered by: ${context.eventName}\nSHA: ${context.sha}\n\nInvestigate and close this issue when resolved.`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['ci-failure', 'automated']
            });

  deploy:
    needs: update-feed
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main

      - name: Fast-forward to latest main
        run: |
          git fetch origin main
          # Fail explicitly if deploy can't fast-forward (means something
          # else pushed diverging history while update-feed was running).
          git merge --ff-only origin/main

      - name: Setup Pages
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Upload artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
