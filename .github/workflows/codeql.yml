name: CodeQL Analysis

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly scan on Monday at 03:00 UTC
    - cron: '0 3 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-24.04
    timeout-minutes: 360
    permissions:
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        language: [javascript-typescript]

    steps:
      - name: Checkout repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Initialize CodeQL
        uses: github/codeql-action/init@51313611dfbc5bd21517390ab8e8517fd8363fb1 # v3.25.15
        with:
          languages: ${{ matrix.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@51313611dfbc5bd21517390ab8e8517fd8363fb1 # v3.25.15

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@51313611dfbc5bd21517390ab8e8517fd8363fb1 # v3.25.15
        with:
          category: /language:${{ matrix.language }}
